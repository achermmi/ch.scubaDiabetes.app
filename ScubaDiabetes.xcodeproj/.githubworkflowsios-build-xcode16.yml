name: iOS Build with Auto-Tag (Xcode 16)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy
    runs-on: macos-15  # macOS 15 ha Xcode 16
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Select Xcode 16
      run: |
        sudo xcode-select -s /Applications/Xcode_16.0.app
        xcodebuild -version
    
    - name: List available devices
      run: xcrun simctl list devices available
    
    - name: Build for iOS
      run: |
        set -o pipefail
        xcodebuild clean build \
          -project ScubaDiabetes.xcodeproj \
          -scheme ScubaDiabetes \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | tee build-ios.log
    
    - name: Build for iPadOS
      run: |
        set -o pipefail
        xcodebuild build \
          -project ScubaDiabetes.xcodeproj \
          -scheme ScubaDiabetes \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | tee build-ipad.log
    
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build-ios.log
          build-ipad.log
    
    - name: Generate Build Info
      if: success()
      run: |
        mkdir -p build-info
        echo "Build #${{ github.run_number }}" > build-info/build-summary.txt
        echo "Commit: ${{ github.sha }}" >> build-info/build-summary.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info/build-summary.txt
        echo "Date: $(date)" >> build-info/build-summary.txt
        echo "Bundle ID: ch.scubadiabetes.app" >> build-info/build-summary.txt
        echo "Xcode: $(xcodebuild -version | head -n 1)" >> build-info/build-summary.txt
    
    - name: Upload Build Info
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: build-info/
        retention-days: 90
    
    - name: Create Success Tag
      if: success()
      run: |
        TAG_NAME="build-success-$(date +'%Y%m%d-%H%M%S')"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        git tag -a "$TAG_NAME" -m "✅ Successful build at $(date)"
        git push origin "$TAG_NAME"
    
    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-success-${{ github.run_number }}
        name: "✅ Build Riuscita #${{ github.run_number }}"
        body: |
          ## 🎉 Build Completata con Successo
          
          ### 📱 Informazioni App
          - **Bundle ID**: ch.scubadiabetes.app
          - **Piattaforme**: iOS, iPadOS, Mac (Designed for iPad), visionOS
          - **Target iOS minimo**: 16.2
          
          ### 🔧 Dettagli Build
          - **Build Number**: #${{ github.run_number }}
          - **Commit**: `${{ github.sha }}`
          - **Branch**: `${{ github.ref_name }}`
          - **Data**: $(date '+%d/%m/%Y alle %H:%M')
          - **Xcode**: 16.0
          
          ### ✅ Status
          - Build iOS: ✅ Passata
          - Build iPadOS: ✅ Passata
          
          ### 📊 Artefatti
          Scarica i log di build dalla sezione Artifacts.
          
          ---
          _Generato automaticamente da GitHub Actions con Xcode 16_
        draft: false
        prerelease: true
        files: |
          build-info/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
