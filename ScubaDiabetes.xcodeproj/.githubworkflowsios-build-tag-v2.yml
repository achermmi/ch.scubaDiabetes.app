name: iOS Build with Auto-Tag

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build and Deploy
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.2.app
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: |
          .build
          ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Build for iOS
      run: |
        xcodebuild clean build \
          -project ScubaDiabetes.xcodeproj \
          -scheme ScubaDiabetes \
          -destination 'generic/platform=iOS Simulator' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Build for iPadOS
      run: |
        xcodebuild build \
          -project ScubaDiabetes.xcodeproj \
          -scheme ScubaDiabetes \
          -destination 'generic/platform=iOS Simulator' \
          -sdk iphonesimulator \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Generate Build Info
      if: success()
      run: |
        mkdir -p build-info
        echo "Build #${{ github.run_number }}" > build-info/build-summary.txt
        echo "Commit: ${{ github.sha }}" >> build-info/build-summary.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info/build-summary.txt
        echo "Date: $(date)" >> build-info/build-summary.txt
        echo "Bundle ID: ch.scubadiabetes.app" >> build-info/build-summary.txt
        echo "Xcode: $(xcodebuild -version | head -n 1)" >> build-info/build-summary.txt
    
    - name: Upload Build Info
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: build-info/
        retention-days: 90
    
    - name: Create Success Tag
      if: success()
      run: |
        TAG_NAME="build-success-$(date +'%Y%m%d-%H%M%S')"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        git tag -a "$TAG_NAME" -m "✅ Successful build at $(date)"
        git push origin "$TAG_NAME"
    
    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-success-${{ github.run_number }}
        name: "✅ Build Riuscita #${{ github.run_number }}"
        body: |
          ## 🎉 Build Completata con Successo
          
          ### 📱 Informazioni App
          - **Bundle ID**: ch.scubadiabetes.app
          - **Piattaforme**: iOS, iPadOS, Mac (Designed for iPad), visionOS
          - **Target iOS minimo**: 16.2
          
          ### 🔧 Dettagli Build
          - **Build Number**: #${{ github.run_number }}
          - **Commit**: `${{ github.sha }}`
          - **Branch**: `${{ github.ref_name }}`
          - **Data**: $(date '+%d/%m/%Y alle %H:%M')
          
          ### ✅ Status
          - Build iOS: ✅ Passata
          - Build iPadOS: ✅ Passata
          - Tests: ⏭️ Skipped (da configurare)
          
          ### 📊 Note
          I test sono stati temporaneamente disabilitati per permettere il deploy.
          Saranno riabilitati in futuro quando il test environment sarà configurato.
          
          ---
          _Generato automaticamente da GitHub Actions_
        draft: false
        prerelease: true
        files: |
          build-info/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
