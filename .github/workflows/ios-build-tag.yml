name: iOS Build with Auto-Tag

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2.0'
    
    - name: Install xcpretty
      run: gem install xcpretty
    
    - name: Cache Swift Package Manager
      uses: actions/cache@v5
      with:
        path: |
          .build
          ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Build for iOS
      run: |
        xcodebuild clean build \
          -scheme ScubaDiabetes \
          -destination 'generic/platform=iOS Simulator' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Build for iPadOS
      run: |
        xcodebuild build \
          -scheme ScubaDiabetes \
          -destination 'generic/platform=iOS Simulator' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Generate Build Info
      if: success()
      run: |
        mkdir -p build-info
        echo "Build #${{ github.run_number }}" > build-info/build-summary.txt
        echo "Commit: ${{ github.sha }}" >> build-info/build-summary.txt
        echo "Branch: ${{ github.ref_name }}" >> build-info/build-summary.txt
        echo "Date: $(date)" >> build-info/build-summary.txt
        echo "Bundle ID: ch.scubadiabetes.app" >> build-info/build-summary.txt
    
    - name: Upload Build Info
      if: success()
      uses: actions/upload-artifact@v5
      with:
        name: build-info
        path: build-info/
        retention-days: 90
    
    - name: Create Success Tag
      if: success()
      run: |
        # Crea un tag con la data e l'ora
        TAG_NAME="build-success-$(date +'%Y%m%d-%H%M%S')"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        git tag -a "$TAG_NAME" -m "✅ Successful build at $(date)"
        git push origin "$TAG_NAME"
    
    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-success-${{ github.run_number }}
        name: "✅ Build Riuscita #${{ github.run_number }}"
        body: |
          ## 🎉 Build Completata con Successo
          
          ### 📱 Informazioni App
          - **Bundle ID**: ch.scubadiabetes.app
          - **Piattaforme**: iOS, iPadOS, Mac (Designed for iPad), visionOS
          - **Target iOS minimo**: 16.2
          
          ### 🔧 Dettagli Build
          - **Build Number**: #${{ github.run_number }}
          - **Commit**: `${{ github.sha }}`
          - **Branch**: `${{ github.ref_name }}`
          - **Data**: $(date '+%d/%m/%Y alle %H:%M')
          
          ### ✅ Test
          - Build iOS: Passata
          - Build iPadOS: Passata
          - Unit Tests: Passati
          
          ### 📊 Artefatti
          Controlla la sezione "Artifacts" di questa release per scaricare i risultati dei test.
          
          ---
          _Generato automaticamente da GitHub Actions_
        draft: false
        prerelease: true
        files: |
          build-info/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
