name: iOS Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.3'
    
    - name: Cache SPM dependencies
      uses: actions/cache@v4
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Install dependencies
      run: |
        if [ -f "Podfile" ]; then
          pod install
        fi
    
    - name: Build
      run: |
        xcodebuild clean build \
          -scheme ScubaDiabetes \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.4' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty
      
    - name: Run Tests
      run: |
        xcodebuild test \
          -scheme ScubaDiabetes \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.4' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty
      continue-on-error: false
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          *.xcresult
          TestResults/
    
    - name: Commit and Push if Build Succeeded
      if: success() && github.event_name == 'push'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        
        # Aggiungi un file di build status
        mkdir -p .build-status
        echo "Last successful build: $(date)" > .build-status/last-success.txt
        echo "Commit: ${{ github.sha }}" >> .build-status/last-success.txt
        
        git add .build-status/
        git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Build succeeded at $(date)" && git push)
    
    - name: Notify on Success
      if: success()
      run: |
        echo "✅ Build completed successfully!"
        echo "Commit: ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"
