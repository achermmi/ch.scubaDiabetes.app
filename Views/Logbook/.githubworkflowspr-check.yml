name: PR Check

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    name: Build and Test PR
    runs-on: macos-14
    
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.3'
    
    - name: Install xcpretty
      run: gem install xcpretty
    
    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: |
          .build
          ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Build
      run: |
        xcodebuild clean build \
          -scheme ScubaDiabetes \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.4' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Run Tests
      run: |
        xcodebuild test \
          -scheme ScubaDiabetes \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.4' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          -enableCodeCoverage YES \
          | xcpretty && exit ${PIPESTATUS[0]}
    
    - name: Comment PR
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ job.status }}';
          const emoji = status === 'success' ? '✅' : '❌';
          const message = status === 'success' 
            ? 'Build e test completati con successo!' 
            : 'Build o test falliti. Controlla i log.';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `${emoji} **${message}**\n\nCommit: \`${{ github.event.pull_request.head.sha }}\``
          });
