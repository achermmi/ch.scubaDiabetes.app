name: iOS Build with Auto-Tag

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.3'
    
    - name: Build
      run: |
        xcodebuild clean build \
          -scheme ScubaDiabetes \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.4' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Run Tests
      run: |
        xcodebuild test \
          -scheme ScubaDiabetes \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.4' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Create Success Tag
      if: success()
      run: |
        # Crea un tag con la data e l'ora
        TAG_NAME="build-success-$(date +'%Y%m%d-%H%M%S')"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        git tag -a "$TAG_NAME" -m "✅ Successful build at $(date)"
        git push origin "$TAG_NAME"
    
    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-success-${{ github.run_number }}
        name: Build #${{ github.run_number }}
        body: |
          ✅ Build completata con successo
          
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref }}
          **Data:** $(date)
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
